name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-main
  cancel-in-progress: false

# 部署架构：runner 跑 quality 检查 → 打包源码 tarball → scp 到阿里云服务器 →
# 服务器本地 docker compose build + up。不再走 ghcr.io 镜像推拉，规避国际带宽问题。
#
# 备用方案（A+E）：如本路径出现问题，可 git revert 此 workflow 切回 ghcr.io 推拉路径。
# Dockerfile / .dockerignore 已是优化版本（standalone 分层 + 排除非必要文件），
# 无论走哪条路径都受益。

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npx vitest run --passWithNoTests

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          # git archive 自动排除 .git 和 untracked 文件
          # docker build 阶段 .dockerignore 还会再次过滤
          git archive --format=tar.gz -o finsim-src.tar.gz HEAD
          ls -lh finsim-src.tar.gz

      - name: Copy source tarball to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: finsim-src.tar.gz
          target: /opt/finsim/
          overwrite: true

      - name: Build and deploy on server
        uses: appleboy/ssh-action@v1
        env:
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: GIT_SHA
          command_timeout: 60m
          script: |
            set -e
            cd /opt/finsim

            # 解压源码（覆盖现有源码文件；保留 .env、last-deployed-* 等非源码文件）
            tar -xzf finsim-src.tar.gz
            rm finsim-src.tar.gz

            # 构建 app image（postgres 用 image，无 build 段，不动）
            # docker layer cache 在服务器本地，第二次起 standalone node_modules 层缓存命中
            docker compose build app

            # 启动/更新 app（postgres 已运行 → 保留，复用 pgdata 卷与 uploads 卷）
            docker compose up -d app

            # 清理 dangling images
            docker image prune -f

            # 记录部署元数据
            echo "${GIT_SHA}" > /opt/finsim/last-deployed-sha
            date -u +"%Y-%m-%dT%H:%M:%SZ" > /opt/finsim/last-deployed-at

            # 简单健康检查
            sleep 5
            docker compose ps

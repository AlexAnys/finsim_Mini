name: Server Diagnose

# 手动触发：gh workflow run server-diagnose.yml
# 用途：SSH 到生产服务器输出 container 状态/日志/启动错误
# 不修改任何状态，仅读取诊断信息

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and collect diagnostics
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            set +e
            cd /opt/finsim

            echo "=========================================="
            echo "1) docker compose ps"
            echo "=========================================="
            docker compose ps

            echo ""
            echo "=========================================="
            echo "2) docker ps (raw, includes restart count)"
            echo "=========================================="
            docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'

            echo ""
            echo "=========================================="
            echo "3) Container restart count"
            echo "=========================================="
            docker inspect finsim-app-1 --format '{{.Name}} | RestartCount={{.RestartCount}} | State={{.State.Status}} | ExitCode={{.State.ExitCode}} | Error={{.State.Error}}' 2>&1

            echo ""
            echo "=========================================="
            echo "4) docker compose logs app --tail 200"
            echo "=========================================="
            docker compose logs app --tail 200 2>&1

            echo ""
            echo "=========================================="
            echo "5) curl localhost:3000"
            echo "=========================================="
            curl -sI -m 10 http://localhost:3000 2>&1 | head -20
            echo ""
            curl -s -m 10 http://localhost:3000 2>&1 | head -50

            echo ""
            echo "=========================================="
            echo "6) /opt/finsim 目录结构"
            echo "=========================================="
            ls -la /opt/finsim/ | head -30
            echo "--- src tree (if exists) ---"
            ls /opt/finsim/app 2>/dev/null | head -10
            ls /opt/finsim/lib 2>/dev/null | head -5

            echo ""
            echo "=========================================="
            echo "7) Latest deploy metadata"
            echo "=========================================="
            cat /opt/finsim/last-deployed-sha 2>/dev/null
            cat /opt/finsim/last-deployed-at 2>/dev/null

            echo ""
            echo "=========================================="
            echo "8) docker compose config (resolved)"
            echo "=========================================="
            docker compose config 2>&1 | head -50

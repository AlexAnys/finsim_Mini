services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://finsim:${POSTGRES_PASSWORD:-finsim_dev_password}@postgres:5432/finsim
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - AUTH_TRUST_HOST=true
      - ADMIN_KEY=${ADMIN_KEY:-finsim-teacher-key}
      - AI_PROVIDER=${AI_PROVIDER:-qwen}
      - AI_FALLBACK_PROVIDER=${AI_FALLBACK_PROVIDER:-deepseek}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-turbo}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - FILE_STORAGE_TYPE=local
      - FILE_STORAGE_PATH=/data/uploads
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=finsim
      - POSTGRES_USER=finsim
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-finsim_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsim"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  pgdata:
  uploads:

services:
  app:
    image: ghcr.io/alexanys/finsim_mini:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://finsim:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/finsim
      - AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET must be set}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL must be set (e.g. http://47.100.98.69:3000)}
      - AUTH_TRUST_HOST=true
      - ADMIN_KEY=${ADMIN_KEY:?ADMIN_KEY must be set}
      - AI_PROVIDER=${AI_PROVIDER:-mimo}
      - AI_FALLBACK_PROVIDER=${AI_FALLBACK_PROVIDER:-deepseek}
      - MIMO_API_KEY=${MIMO_API_KEY:-}
      - MIMO_BASE_URL=${MIMO_BASE_URL:-https://api.xiaomimimo.com/v1}
      - MIMO_MODEL=${MIMO_MODEL:-mimo-v2.5-pro}
      - MIMO_OCR_MODEL=${MIMO_OCR_MODEL:-mimo-v2-omni}
      - MIMO_ANTHROPIC_BASE_URL=${MIMO_ANTHROPIC_BASE_URL:-https://token-plan-cn.xiaomimimo.com/anthropic}
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-turbo}
      - OCR_PROVIDER=${OCR_PROVIDER:-qwen}
      - QWEN_OCR_MODEL=${QWEN_OCR_MODEL:-qwen-vl-ocr}
      - OCR_MAX_PAGES=${OCR_MAX_PAGES:-20}
      - OCR_MIN_TEXT_CHARS=${OCR_MIN_TEXT_CHARS:-200}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - FILE_STORAGE_TYPE=local
      - FILE_STORAGE_PATH=/data/uploads
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=finsim
      - POSTGRES_USER=finsim
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finsim"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
